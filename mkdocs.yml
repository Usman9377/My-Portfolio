site_name: "🌱 Muhammad Usman | 🤖 AI in Plant Breeding"
site_description: "Applying 🤖 Artificial Intelligence & 📊 Data Science to 🌾 Plant Breeding & Agricultural Research"
site_author: "Muhammad Usman"
site_url: "https://usman9377.github.io/My-Portfolio/"
use_directory_urls: true

# ────────── Navigation ──────────
nav:
  - 🏠 Home: index.md
  - 🚀 Projects: Projects.md
  - 🧠 Skills: Skills.md
  - ✍️ Blog: Blog.md
  - 🎓 Tasks: Tasks.md
  - 📄 Resume: Resume.md
  - 👨‍🔬 About: About.md
  - 📬 Contact: Contact.md

# ────────── Theme ──────────
theme:
  name: material
  language: en

  # Logo & Favicon
  logo: assets/images/usman.jpg
  favicon: assets/images/usman.jpg

  # Palette: Dark + Light Mode
  palette:
    - scheme: slate
      primary: deep-purple
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: deep-purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  # Fonts
  font:
    text: Poppins
    code: JetBrains Mono

  # Features
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.footer
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips

# ────────── Extra Styling ──────────
extra_css:
  - stylesheets/extra.css

# ────────── Plugins ──────────
plugins:
  - search

